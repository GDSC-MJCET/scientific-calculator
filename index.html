<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

        <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="calc-wrap" role="application" aria-label="F1 Scientific Calculator">

    <div class="calc-header">
        <div class="calc-header-logo">F1 CALC</div>

        <div class="calc-header-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="display-section">

        <div class="display-expr" id="expr"></div>

        <div class="display-main" id="display">
            0
        </div>

    <div class="btn-grid">

        <button class="btn btn-fn">sin</button>
        <button class="btn btn-fn">cos</button>
        <button class="btn btn-fn">tan</button>
        <button class="btn btn-fn">log</button>

        <button class="btn btn-fn">ln</button>
        <button class="btn btn-fn">√</button>
        <button class="btn btn-fn">π</button>
        <button class="btn btn-fn">e</button>

        <button class="btn btn-special">%</button>
        <button class="btn btn-clear">AC</button>
        <button class="btn btn-del">DEL</button>

        <button class="btn btn-fn">(</button>
        <button class="btn btn-fn">)</button>

        <button class="btn btn-op">÷</button>

        <button class="btn btn-num">7</button>
        <button class="btn btn-num">8</button>
        <button class="btn btn-num">9</button>

        <button class="btn btn-op">×</button>

        <button class="btn btn-special">+/-</button>

        <button class="btn btn-num">4</button>
        <button class="btn btn-num">5</button>
        <button class="btn btn-num">6</button>

        <button class="btn btn-op">-</button>

        <button class="btn btn-fn" style="font-size:14px">
            x!
        </button>

        <button class="btn btn-num">1</button>
        <button class="btn btn-num">2</button>
        <button class="btn btn-num">3</button>

        <button class="btn btn-op">+</button>

        <button class="btn btn-eq">=</button>

        <button class="btn btn-num btn-zero">0</button>

        <button class="btn btn-num">.</button>

        <button class="btn btn-fn" style="font-size:10px">
            x²
        </button>

    </div>

</div>

</body>
</html>
